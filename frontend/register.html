<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Otobüs Bilet Sistemi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Oto<span>Bilet</span></a>
        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>
            <a href="login.html">Giriş Yap</a>
        </div>
    </nav>

    <div class="container auth-container">
        <div class="glass-card">
            <h2>Kayıt Ol</h2>
            <p class="subtitle">Aramıza katılın ve hızlıca biletinizi alın.</p>
            
            <div id="authAlert" class="form-alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Ad Soyad</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Örn: Ali Yılmaz" required>
                </div>

                <div class="form-group">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" class="form-control" placeholder="ornek@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="phoneNumber">Telefon Numarası</label>
                    <input type="tel" id="phoneNumber" class="form-control" placeholder="Örn: 05551234567" required>
                </div>

                <div class="form-group">
                    <label for="role">Kayıt Türü</label>
                    <select id="role" class="form-control" required>
                        <option value="USER">Yolcu</option>
                        <option value="COMPANY">Firma Sahibi</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Şifre Tekrar</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Kayıt Ol</button>
            </form>

            <div class="auth-links">
                Zaten hesabınız var mı? <a href="login.html">Giriş Yapın</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
